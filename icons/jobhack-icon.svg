<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1c1c1e"/>

  <!-- Terminal lines -->
  <rect x="10" y="12" width="44" height="7" rx="2" fill="#4ade80" opacity="0.95"/>
  <rect x="10" y="24" width="32" height="6" rx="2" fill="#ffffff" opacity="0.28"/>
  <rect x="10" y="34" width="38" height="6" rx="2" fill="#ffffff" opacity="0.18"/>

  <!-- Magnifier circle background badge -->
  <circle cx="44" cy="46" r="14" fill="#1d6f42"/>

  <!-- Magnifier glass -->
  <circle cx="42" cy="44" r="7" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Magnifier handle -->
  <line x1="47" y1="49" x2="53" y2="55" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
</svg>
